# gnmi-collector configuration
# All credentials are read from environment variables for security.

target:
  address: 127.0.0.1
  port: 50051
  tls:
    enabled: true
    skip_verify: true        # Self-signed cert on the switch
  credentials:
    username_env: GNMI_USER  # NX-OS SSH username
    password_env: GNMI_PASS  # NX-OS SSH password

collection:
  mode: subscribe            # poll (Get every interval) or subscribe (persistent stream)
  interval: 300s             # 5 minutes — matches current cron interval (used by poll mode + sample default)
  timeout: 30s               # Per-path Get request timeout
  encoding: JSON             # JSON or PROTO (NX-OS does not support JSON_IETF)

azure:
  workspace_id_env: WORKSPACE_ID
  primary_key_env: PRIMARY_KEY
  secondary_key_env: SECONDARY_KEY
  device_type: cisco-nx-os

paths:
  # ============================================================
  # OpenConfig paths (working well, keep enabled)
  # ============================================================
  - name: interface-counters
    yang_path: /openconfig-interfaces:interfaces/interface/state/counters
    table: GnmiTestInterfaceCounter
    enabled: true
    mode: sample
    sample_interval: 60s

  - name: interface-status
    yang_path: /openconfig-interfaces:interfaces/interface/state
    table: GnmiTestInterfaceStatus
    enabled: true
    mode: on_change

  - name: system-state
    yang_path: /openconfig-system:system/state
    table: GnmiTestSystemUptime
    enabled: true

  - name: platform-inventory
    yang_path: /openconfig-platform:components/component
    table: GnmiTestInventory
    enabled: true

  # ============================================================
  # Supplementary OpenConfig paths (fill specific gaps)
  # ============================================================
  - name: if-ethernet
    yang_path: /openconfig-if-ethernet:interfaces/interface/ethernet/state
    table: GnmiTestInterfaceEthernet
    enabled: true
    mode: on_change

  - name: bgp-global
    yang_path: /openconfig-network-instance:network-instances/network-instance/protocols/protocol/bgp/global/state
    table: GnmiTestBgpGlobal
    enabled: true

  - name: transceiver-channel
    yang_path: /openconfig-platform:components/component/transceiver/physical-channels
    table: GnmiTestTransceiverDom
    enabled: true

  # ============================================================
  # Native Cisco YANG paths (Cisco-NX-OS-device model)
  # These provide much richer data than their OpenConfig equivalents.
  # ============================================================
  - name: nx-transceiver
    yang_path: /System/intf-items/phys-items/PhysIf-list/phys-items
    table: GnmiTestTransceiver
    enabled: true

  - name: nx-arp
    yang_path: /System/arp-items/inst-items/dom-items/Dom-list/db-items/Db-list/adj-items/AdjEp-list
    table: GnmiTestArpEntry
    enabled: true

  - name: nx-bgp-peers
    yang_path: /System/bgp-items/inst-items/dom-items/Dom-list/peer-items/Peer-list
    table: GnmiTestBgpSummary
    enabled: true
    mode: on_change

  - name: nx-env-sensor
    yang_path: /System/ch-items/supslot-items/SupCSlot-list/sup-items/sensor-items
    table: GnmiTestEnvironmentTemperature
    enabled: true

  - name: nx-env-psu
    yang_path: /System/ch-items/psuslot-items/PsuSlot-list
    table: GnmiTestEnvironmentPower
    enabled: true

  - name: nx-sys-cpu
    yang_path: /System/procsys-items/syscpusummary-items
    table: GnmiTestSystemResources
    enabled: true

  - name: nx-sys-memory
    yang_path: /System/procsys-items/sysmem-items
    table: GnmiTestSystemResources
    enabled: true

  - name: nx-mac-table
    yang_path: /System/mac-items
    table: GnmiTestMacTable
    enabled: true

  - name: nx-lldp
    yang_path: /System/lldp-items/inst-items/if-items/If-list
    table: GnmiTestLldpNeighbor
    enabled: true
    mode: on_change

  # ============================================================
  # Disabled OpenConfig paths (replaced by native equivalents)
  # Enable these if native paths have issues on a specific switch.
  # ============================================================
  - name: bgp-neighbors
    yang_path: /openconfig-network-instance:network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state
    table: GnmiTestBgpSummary
    enabled: false
    mode: on_change

  - name: lldp-neighbors
    yang_path: /openconfig-lldp:lldp/interfaces/interface/neighbors
    table: GnmiTestLldpNeighbor
    enabled: false
    mode: on_change

  - name: temperature
    yang_path: /openconfig-platform:components/component/state/temperature
    table: GnmiTestEnvironmentTemperature
    enabled: false

  - name: power-supply
    yang_path: /openconfig-platform:components/component/power-supply
    table: GnmiTestEnvironmentPower
    enabled: false

  - name: system-cpus
    yang_path: /openconfig-system:system/cpus
    table: GnmiTestSystemResources
    enabled: false

  - name: system-memory
    yang_path: /openconfig-system:system/memory
    table: GnmiTestSystemResources
    enabled: false

  - name: arp-table
    yang_path: /openconfig-if-ip:interfaces/interface/subinterfaces/subinterface/ipv4/neighbors
    table: GnmiTestArpEntry
    enabled: false

  - name: mac-table
    yang_path: /openconfig-network-instance:network-instances/network-instance/fdb/mac-table
    table: GnmiTestMacTable
    enabled: false

  - name: transceiver
    yang_path: /openconfig-platform:components/component/transceiver
    table: GnmiTestTransceiver
    enabled: false
